<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>ProFind — encontre o especialista certo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20,400,0,0" rel="stylesheet">
<style>
  :root{
    --indigo:#4F46E5; --purple:#7C3AED; --amber:#F5A623;
    --text:#12142A; --text-2:#6B7080; --text-3:#9AA0B4; --border:#E7E9F1;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{font-family:'Inter',sans-serif;color:var(--text);height:100vh;display:flex;flex-direction:column;}
  .icon{font-family:'Material Symbols Outlined';font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 20;font-size:20px;line-height:1;}
  a{text-decoration:none;color:inherit;}

  /* top bar */
  .topbar{display:flex;justify-content:flex-end;align-items:center;gap:22px;padding:18px 26px;font-size:13.5px;color:var(--text-2);}
  .topbar a:hover{color:var(--text);}
  .topbar .avatar{width:30px;height:30px;border-radius:50%;background:linear-gradient(135deg,var(--indigo),var(--purple));color:#fff;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;}

  /* center */
  .center{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding-bottom:80px;}
  .logo{display:flex;align-items:center;gap:2px;font-size:64px;font-weight:800;letter-spacing:-0.02em;margin-bottom:28px;}
  .logo span:nth-child(1){color:var(--indigo);}
  .logo span:nth-child(2){color:var(--purple);}
  .logo span:nth-child(3){color:#A78BFA;}
  .logo span:nth-child(4){color:var(--amber);}
  .logo span:nth-child(5){color:var(--indigo);}
  .logo span:nth-child(6){color:var(--purple);}
  .logo span:nth-child(7){color:var(--amber);}
  .logo .dot{color:var(--text-3);font-weight:800;}

  .search-bar{
    display:flex;align-items:center;gap:10px;
    width:100%;max-width:560px;
    border:1px solid var(--border);border-radius:24px;
    padding:12px 18px;box-shadow:0 1px 6px rgba(20,20,50,0.06);
    transition:box-shadow .15s;
  }
  .search-bar:hover{box-shadow:0 2px 10px rgba(20,20,50,0.1);}
  .search-bar .icon.lead{color:var(--text-3);}
  .search-bar input{flex:1;border:none;outline:none;font-size:15px;font-family:'Inter',sans-serif;color:var(--text);}
  .search-bar input::placeholder{color:var(--text-3);}
  .search-bar .icon.trail{color:var(--purple);cursor:pointer;}

  .actions{display:flex;gap:12px;margin-top:26px;}
  .actions button{
    font-family:'Inter',sans-serif;font-size:13.5px;font-weight:500;color:var(--text-2);
    background:#F6F7FB;border:1px solid #F6F7FB;border-radius:8px;padding:9px 18px;cursor:pointer;
  }
  .actions button:hover{border-color:var(--border);}
  .actions button.primary{color:var(--indigo);}

  .examples{display:flex;gap:8px;margin-top:30px;flex-wrap:wrap;justify-content:center;max-width:520px;}
  .examples span{font-size:12.5px;color:var(--text-2);background:#F6F7FB;border-radius:16px;padding:6px 14px;cursor:pointer;}
  .examples span:hover{background:#EEF0FF;color:var(--indigo);}

  .lang-line{margin-top:22px;font-size:12.5px;color:var(--text-2);}
  .lang-line a{color:var(--indigo);margin-left:5px;}

  /* footer */
  footer{border-top:1px solid var(--border);background:#F6F7FB;}
  .footer-row{display:flex;justify-content:space-between;padding:14px 26px;font-size:12.5px;color:var(--text-2);}
  .footer-row .group{display:flex;gap:22px;}
  .footer-row a:hover{color:var(--text);}
</style>
</head>
<body>

  <div class="topbar">
    <a href="cadastro-profissional.html">Para profissionais</a>
    <a href="#">Como funciona</a>
    <div class="avatar">C</div>
  </div>

  <div class="center">
    <div class="logo">
      <span>P</span><span>r</span><span>o</span><span>F</span><span>i</span><span>n</span><span>d</span><span class="dot">.</span>
    </div>

    <form class="search-bar" id="form-busca" action="resultados.html" method="get">
      <span class="icon lead">search</span>
      <input id="campo-busca-home" name="q" type="text" placeholder="O que você precisa? Ex: Advogado previdenciário" autofocus>
      <span class="icon trail">auto_awesome</span>
    </form>

    <div class="actions">
      <button type="submit" form="form-busca">Buscar profissional</button>
      <button class="primary" type="submit" form="form-busca">Perguntar para a IA</button>
    </div>

    <div class="examples">
      <span onclick="buscarExemplo('Meu pai teve o benefício do INSS negado')">Meu pai teve o benefício do INSS negado</span>
      <span onclick="buscarExemplo('Vou abrir uma hamburgueria')">Vou abrir uma hamburgueria</span>
      <span onclick="buscarExemplo('Preciso de um logo')">Preciso de um logo</span>
    </div>

    <script>
      function buscarExemplo(texto){
        document.getElementById('campo-busca-home').value = texto;
        document.getElementById('form-busca').submit();
      }
    </script>

    <div class="lang-line">ProFind oferecido em: <a href="#">Português</a> <a href="#">English</a> <a href="#">Español</a></div>
  </div>

  <footer>
    <div class="footer-row">
      <div class="group">
        <a href="#">Sobre</a>
        <a href="#">Como funciona</a>
      </div>
      <div class="group">
        <a href="#">Privacidade</a>
        <a href="#">Termos</a>
        <a href="cadastro-profissional.html">Anuncie seu perfil</a>
      </div>
    </div>
  </footer>

</body>
</html>

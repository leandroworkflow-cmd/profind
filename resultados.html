<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>ProFind — resultados da busca</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20,400,0,0" rel="stylesheet">
<style>
  :root{
    --indigo:#4F46E5; --purple:#7C3AED; --amber:#F5A623;
    --bg:#F7F8FC; --surface:#FFFFFF; --border:#E7E9F1;
    --text:#12142A; --text-2:#6B7080; --text-3:#9AA0B4;
    --indigo-bg:#EEF0FF; --radius:14px;
  }
  *{box-sizing:border-box;margin:0;padding:0;}
  body{background:var(--bg);color:var(--text);font-family:'Inter',sans-serif;line-height:1.5;}
  .icon{font-family:'Material Symbols Outlined';font-variation-settings:'FILL' 0,'wght' 400,'GRAD' 0,'opsz' 20;font-size:20px;line-height:1;}
  a{text-decoration:none;color:inherit;}
  .wrap{max-width:960px;margin:0 auto;padding:0 24px;}

  nav{background:var(--surface);border-bottom:1px solid var(--border);}
  .nav-row{display:flex;align-items:center;gap:24px;padding:14px 24px;max-width:960px;margin:0 auto;}
  .nav-logo{font-weight:800;font-size:18px;color:var(--indigo);flex-shrink:0;}
  .nav-logo span{color:var(--text-3);}
  .nav-search{flex:1;display:flex;align-items:center;gap:8px;background:var(--bg);border:1px solid var(--border);border-radius:20px;padding:8px 16px;}
  .nav-search input{flex:1;border:none;background:transparent;outline:none;font-size:13.5px;font-family:'Inter',sans-serif;}
  .nav-search .icon{color:var(--text-3);font-size:18px;cursor:pointer;}
  .nav-links{display:flex;gap:18px;font-size:13px;color:var(--text-2);flex-shrink:0;}

  .results-outer{padding:28px 0 60px;}
  .results-grid{display:grid;grid-template-columns:230px 1fr;gap:22px;}
  .filters{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:18px;height:fit-content;}
  .filters-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:16px;}
  .filters-head h4{font-size:14px;font-weight:700;}
  .filters-head span{font-size:12px;color:var(--indigo);font-weight:600;cursor:pointer;}
  .f-group{margin-bottom:18px;}
  .f-group label{font-size:12px;font-weight:600;color:var(--text-2);display:block;margin-bottom:8px;}
  .f-select{width:100%;font-size:13px;border:1px solid var(--border);border-radius:8px;padding:8px 10px;color:var(--text);background:var(--bg);}
  .f-check{display:flex;align-items:center;gap:8px;font-size:12.5px;color:var(--text-2);margin-bottom:7px;}
  .f-empty{font-size:12px;color:var(--text-3);font-style:italic;}

  .results-main h2{font-size:17px;font-weight:700;margin-bottom:16px;}
  .results-count{font-size:12.5px;color:var(--text-2);margin-bottom:16px;}

  .pro-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px 18px;display:flex;gap:14px;margin-bottom:12px;align-items:center;}
  .pro-avatar{width:52px;height:52px;border-radius:12px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-weight:700;font-size:15px;color:#fff;background:linear-gradient(135deg,var(--indigo),var(--purple));}
  .pro-body{flex:1;min-width:0;}
  .pro-name{font-size:14.5px;font-weight:700;}
  .pro-role{font-size:12.5px;color:var(--text-2);margin-top:1px;}
  .pro-meta{font-size:12px;color:var(--text-2);margin-top:6px;}
  .pro-source{font-size:11.5px;color:var(--indigo);margin-top:6px;display:block;word-break:break-all;}
  .pro-side{flex-shrink:0;}
  .pro-btn{background:var(--indigo);color:#fff;border:none;border-radius:8px;padding:8px 16px;font-size:12.5px;font-weight:600;cursor:pointer;}

  .empty-state{background:var(--surface);border:1px dashed var(--border);border-radius:var(--radius);padding:40px 30px;text-align:center;}
  .empty-state .icon{font-size:32px;color:var(--text-3);margin-bottom:12px;}
  .empty-state h3{font-size:15px;font-weight:700;margin-bottom:8px;}
  .empty-state p{font-size:13px;color:var(--text-2);max-width:420px;margin:0 auto;}

  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--text);color:#fff;font-size:12.5px;padding:12px 18px;border-radius:10px;display:flex;align-items:center;gap:8px;opacity:0;pointer-events:none;transition:opacity .25s,transform .25s;z-index:99;}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
  .toast .icon{color:#86EFAC;font-size:16px;}
</style>
</head>
<body>

<div class="toast" id="toast"><span class="icon">check_circle</span><span id="toast-text"></span></div>

<nav>
  <div class="nav-row">
    <a href="index.html" class="nav-logo">ProFind<span>.</span></a>
    <div class="nav-search">
      <span class="icon" onclick="executarBusca()">search</span>
      <input id="campo-busca" type="text" placeholder="Buscar profissional, empresa ou organização">
    </div>
    <div class="nav-links">
      <a href="cadastro-profissional.html">Para profissionais</a>
      <a href="#">Entrar</a>
    </div>
  </div>
</nav>

<div class="results-outer">
  <div class="wrap results-grid">
    <div class="filters">
      <div class="filters-head"><h4>Filtros</h4><span onclick="limparFiltros()">Limpar</span></div>
      <div class="f-group">
        <label>Região</label>
        <select class="f-select" id="filtro-regiao"><option value="">Todas</option></select>
      </div>
      <div class="f-group">
        <label>Categoria</label>
        <div id="filtro-categorias"><span class="f-empty">Nenhum dado coletado ainda</span></div>
      </div>
    </div>

    <div class="results-main">
      <h2 id="titulo-resultados">Resultados</h2>
      <div class="results-count" id="contador-resultados"></div>
      <div id="lista-resultados"></div>
    </div>
  </div>
</div>

<script>
let TODOS_OS_DADOS = [];
let CATEGORIA_ATIVA = "";

function normalizar(txt){
  return (txt || "").toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g, "");
}

function relevancia(item, termos){
  let score = 0;
  const campos = [
    { valor: item.categoria, peso: 3 },
    { valor: item.nome, peso: 2 },
    { valor: item.regiao, peso: 2 },
  ];
  for(const termo of termos){
    for(const c of campos){
      if(normalizar(c.valor).includes(termo)) score += c.peso;
    }
  }
  return score;
}

function iniciais(nome){
  if(!nome) return "?";
  const partes = nome.trim().split(/\s+/);
  return ((partes[0]?.[0] || "") + (partes[1]?.[0] || "")).toUpperCase();
}

function popularFiltros(dados){
  const regiaoSelect = document.getElementById('filtro-regiao');
  const regioes = [...new Set(dados.map(d => d.regiao).filter(Boolean))].sort();
  regioes.forEach(r => {
    const opt = document.createElement('option');
    opt.value = r; opt.textContent = r;
    regiaoSelect.appendChild(opt);
  });

  const catContainer = document.getElementById('filtro-categorias');
  const categorias = [...new Set(dados.map(d => d.categoria).filter(Boolean))].sort();
  if(categorias.length === 0){
    catContainer.innerHTML = '<span class="f-empty">Nenhum dado coletado ainda</span>';
  } else {
    catContainer.innerHTML = categorias.map(c => `
      <label class="f-check">
        <input type="checkbox" value="${c}" onchange="alternarCategoria('${c}', this.checked)"> ${c}
      </label>
    `).join('');
  }
}

function alternarCategoria(cat, marcado){
  CATEGORIA_ATIVA = marcado ? cat : "";
  document.querySelectorAll('#filtro-categorias input[type=checkbox]').forEach(cb => {
    if(cb.value !== cat) cb.checked = false;
  });
  renderizar();
}

function limparFiltros(){
  document.getElementById('filtro-regiao').value = "";
  document.querySelectorAll('#filtro-categorias input[type=checkbox]').forEach(cb => cb.checked = false);
  CATEGORIA_ATIVA = "";
  renderizar();
}

function executarBusca(){
  const q = document.getElementById('campo-busca').value;
  const url = new URL(window.location.href);
  url.searchParams.set('q', q);
  window.location.href = url.toString();
}

function visitarSite(nome, url){
  const toast = document.getElementById('toast');
  document.getElementById('toast-text').textContent = 'Avisamos ' + nome + ' que alguém visitou o perfil';
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 3200);
  if(url && url.startsWith('http')) window.open(url, '_blank');
}

function renderizar(){
  const params = new URLSearchParams(window.location.search);
  const q = params.get('q') || '';
  document.getElementById('campo-busca').value = q;
  document.getElementById('titulo-resultados').textContent = q
    ? `Resultados para "${q}"`
    : 'Todos os profissionais encontrados';

  const regiaoFiltro = document.getElementById('filtro-regiao').value;
  const termos = normalizar(q).split(/\s+/).filter(Boolean);

  let filtrados = TODOS_OS_DADOS.filter(item => {
    if(regiaoFiltro && item.regiao !== regiaoFiltro) return false;
    if(CATEGORIA_ATIVA && item.categoria !== CATEGORIA_ATIVA) return false;
    return true;
  });

  if(termos.length > 0){
    filtrados = filtrados
      .map(item => ({ item, score: relevancia(item, termos) }))
      .filter(x => x.score > 0)
      .sort((a, b) => b.score - a.score)
      .map(x => x.item);
  }

  const lista = document.getElementById('lista-resultados');
  document.getElementById('contador-resultados').textContent =
    TODOS_OS_DADOS.length === 0 ? '' : `${filtrados.length} encontrado(s)`;

  if(TODOS_OS_DADOS.length === 0){
    lista.innerHTML = `
      <div class="empty-state">
        <span class="icon">travel_explore</span>
        <h3>Ainda não coletamos profissionais</h3>
        <p>O robô de coleta (o crawler que vocês configuraram) ainda não populou o arquivo <code>resultados.json</code>, ou ele está vazio. Rode o robô e substitua esse arquivo no repositório pra ver profissionais reais aqui.</p>
      </div>`;
    return;
  }

  if(filtrados.length === 0){
    lista.innerHTML = `
      <div class="empty-state">
        <span class="icon">search_off</span>
        <h3>Nenhum resultado para essa busca</h3>
        <p>Temos ${TODOS_OS_DADOS.length} profissional(is) coletado(s) no total, mas nenhum bate com "${q}" ou os filtros ativos. Tente um termo mais genérico ou limpe os filtros.</p>
      </div>`;
    return;
  }

  lista.innerHTML = filtrados.map(item => `
    <div class="pro-card">
      <div class="pro-avatar">${iniciais(item.nome)}</div>
      <div class="pro-body">
        <div class="pro-name">${item.nome || 'Nome não identificado'}</div>
        <div class="pro-role">${item.categoria || ''}${item.regiao ? ' · ' + item.regiao : ''}</div>
        ${item.contato_publico ? `<div class="pro-meta">${item.contato_publico}</div>` : ''}
        <span class="pro-source">${item.fonte_url || ''}</span>
      </div>
      <div class="pro-side">
        <button class="pro-btn" onclick="visitarSite('${(item.nome||'').replace(/'/g,"")}', '${item.fonte_url||''}')">Visitar site</button>
      </div>
    </div>
  `).join('');
}

async function carregar(){
  try{
    const res = await fetch('resultados.json', { cache: 'no-store' });
    TODOS_OS_DADOS = res.ok ? await res.json() : [];
  } catch {
    TODOS_OS_DADOS = [];
  }
  popularFiltros(TODOS_OS_DADOS);
  renderizar();
}

document.getElementById('filtro-regiao').addEventListener('change', renderizar);
document.getElementById('campo-busca').addEventListener('keydown', e => { if(e.key === 'Enter') executarBusca(); });

carregar();
</script>

</body>
</html>
